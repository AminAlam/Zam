services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zam_network

  xvfb:
    build:
      context: .
      dockerfile: Dockerfile.xvfb
    restart: unless-stopped
    volumes:
      - x11_socket:/tmp/.X11-unix
      - pulse_socket:/run/pulse
    environment:
      - DISPLAY=:99
      - PULSE_SERVER=unix:/run/pulse/native
    healthcheck:
      test: ["CMD", "sh", "-c", "test -S /tmp/.X11-unix/X99"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - zam_network

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      xvfb:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - screenshots:/app/screenshots
      - videos:/app/videos
      - api_media:/app/api_media
      # Shared X11 and PulseAudio sockets from xvfb service
      - x11_socket:/tmp/.X11-unix
      - pulse_socket:/run/pulse
      # Dev-only mounts. In production these mask the image's baked-in
      # /app/src with the host tree, which breaks `python -m src.main` if
      # the host is incomplete (shallow clone, wrong cwd, missing files).
      # Uncomment when iterating on src/ without rebuilding the image.
      #- ./src:/app/src
      #- ../.cursor:/app/.cursor
    environment:
      - DISPLAY=:99
      - PULSE_SERVER=unix:/run/pulse/native
    networks:
      - zam_network

volumes:
  postgres_data:
  screenshots:
  videos:
  api_media:
  x11_socket:
  pulse_socket:

networks:
  zam_network:
    driver: bridge

